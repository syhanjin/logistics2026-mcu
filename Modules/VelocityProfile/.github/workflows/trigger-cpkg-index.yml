name: Trigger cpkg index refresh

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch refresh request to index repository
        env:
          INDEX_REPO_TOKEN: ${{ secrets.INDEX_REPO_DISPATCH_TOKEN }}
          INDEX_OWNER: ${{ github.repository_owner }}
          INDEX_REPO: index
        run: |
          set -euo pipefail

          if [ -z "$INDEX_REPO_TOKEN" ]; then
            echo "missing INDEX_REPO_DISPATCH_TOKEN" >&2
            exit 1
          fi

          echo "dispatching to ${INDEX_OWNER}/${INDEX_REPO}"

          payload=$(jq -n \
            --arg repo "${GITHUB_REPOSITORY##*/}" \
            --arg full_name "${GITHUB_REPOSITORY}" \
            --arg clone_url "https://github.com/${GITHUB_REPOSITORY}.git" \
            --arg sha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF}" \
            --arg ref_name "${GITHUB_REF_NAME}" \
            '{
              event_type: "cpkg-index-refresh",
              client_payload: {
                repo: $repo,
                full_name: $full_name,
                clone_url: $clone_url,
                sha: $sha,
                ref: $ref,
                ref_name: $ref_name
              }
            }')

          curl --fail --show-error -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${INDEX_REPO_TOKEN}" \
            "https://api.github.com/repos/${INDEX_OWNER}/${INDEX_REPO}/dispatches" \
            -d "$payload"